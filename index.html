        return correct.some(ans => normalize(ans) === nUser);
      }
      return normalize(correct) === nUser;

    // ==========================================
    // 4. 유틸: 로컬스토리지 디바운스 훅
    // ==========================================
    function useDebouncedSave(key, data, delay = 1000) {
      useEffect(() => {
        const handler = setTimeout(() => {
          localStorage.setItem(key, JSON.stringify(data));
        }, delay);
        return () => clearTimeout(handler);
      }, [data, delay, key]);
    }

    // ==========================================
    // 5. 공통 컴포넌트
    // ==========================================
    const Button = ({ children, onClick, variant = 'primary', className = '', type="button", disabled=false }) => {
      const baseStyle = "min-h-[44px] min-w-[44px] px-6 py-3 rounded-xl font-medium transition-transform active:scale-95 flex items-center justify-center gap-2 select-none shadow-sm";
      const variants = {
        primary: "bg-primary text-white hover:bg-primaryFocus disabled:bg-blue-300",
        secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200 disabled:bg-gray-50",
        outline: "border-2 border-primary text-primary hover:bg-blue-50",
        danger: "bg-red-500 text-white hover:bg-red-600"
      };
      return (
        <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    };

    const FullScreenSpinner = () => (
      <div className="fixed inset-0 z-50 flex items-center justify-center bg-white/80 backdrop-blur-sm">
        <div className="flex flex-col items-center">
          <div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
          <p className="mt-4 text-gray-600 font-medium animate-pulse">제출 중입니다...</p>
        </div>
      </div>
    );

    const CustomModal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = "확인", cancelText = "취소" }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
          <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl transform transition-all">
            <h3 className="text-lg font-bold mb-2">{title}</h3>
            <p className="text-gray-600 mb-6">{message}</p>
            <div className="flex gap-3">
              {onCancel && <Button variant="secondary" onClick={onCancel} className="flex-1">{cancelText}</Button>}
              <Button variant={title.includes('종료') || title.includes('취소') || title.includes('나가기') ? 'danger' : 'primary'} onClick={onConfirm} className="flex-1">{confirmText}</Button>
            </div>
          </div>
        </div>
      );
    };

    const Toast = ({ message }) => {
      if (!message) return null;
      return (
        <div className="fixed bottom-20 left-1/2 transform -translate-x-1/2 z-50 px-4 py-2 bg-gray-800/90 text-white rounded-full text-sm shadow-lg backdrop-blur animate-fade-in-up">
          {message}
        </div>
      );
    };

    // ==========================================
    // 6. 가이드 모달 컴포넌트 (앱스스크립트 설명)
    // ==========================================
    const GuideModal = ({ isOpen, onClose }) => {
      if (!isOpen) return null;
      
      const gasCode = `function doPost(e) {
  const sheetName = PropertiesService.getScriptProperties().getProperty('SHEET_NAME') || '${SHEET_NAME}';
  const lock = LockService.getScriptLock();
  lock.tryLock(10000);

  try {
    const doc = SpreadsheetApp.getActiveSpreadsheet();
    let sheet = doc.getSheetByName(sheetName);

    // 1. 시트 탭이 없으면 자동 생성
    if (!sheet) {
      sheet = doc.insertSheet(sheetName);
    }

    const data = JSON.parse(e.postData.contents);
    const keys = Object.keys(data);
    const headers = ["Timestamp", ...keys];

    // 2 & 3. 헤더 자동 생성 및 컬럼 추가
    let existingHeaders = [];
    const lastCol = sheet.getLastColumn();
    if (lastCol > 0) {
      existingHeaders = sheet.getRange(1, 1, 1, lastCol).getValues()[0];
    } else {
      // 1행 헤더가 비어있으면 초기 세팅
      sheet.getRange(1, 1, 1, headers.length).setValues([headers]);
      sheet.getRange(1, 1, 1, headers.length).setFontWeight("bold").setBackground("#f3f4f6");
      existingHeaders = headers;
    }

    // 신규 키가 있으면 헤더 끝에 자동 추가
    const newHeaders = headers.filter(h => !existingHeaders.includes(h));
    if (newHeaders.length > 0) {
       sheet.getRange(1, lastCol + 1, 1, newHeaders.length).setValues([newHeaders]);
       sheet.getRange(1, lastCol + 1, 1, newHeaders.length).setFontWeight("bold").setBackground("#f3f4f6");
       existingHeaders = existingHeaders.concat(newHeaders);
    }

    // 데이터 기록
    const rowData = existingHeaders.map(header => {
      if (header === "Timestamp") return new Date();
      return data[header] !== undefined ? data[header] : "";
    });

    sheet.appendRow(rowData);

    return ContentService.createTextOutput(JSON.stringify({result: "success"}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({error: error.toString()}))
      .setMimeType(ContentService.MimeType.JSON);
  } finally {
    lock.releaseLock();
  }
}`;

      return (
        <div className="fixed inset-0 z-50 bg-gray-50 flex flex-col pt-safe pb-safe">
          <div className="sticky top-0 bg-white/90 backdrop-blur border-b px-4 py-3 flex justify-between items-center z-10 min-h-[60px]">
            <h2 className="text-lg font-bold">관리자 가이드 (설정 방법)</h2>
            <button onClick={onClose} className="p-2 -mr-2 active:scale-95 text-gray-500 min-w-[44px] min-h-[44px] flex items-center justify-center">
              <Icons.Close />
            </button>
          </div>
          
          <div className="flex-1 overflow-y-auto p-4 space-y-6">
            <section className="bg-white rounded-xl p-4 shadow-sm">
              <h3 className="font-bold text-primary mb-2 flex items-center gap-2">
                <span className="bg-blue-100 text-blue-800 w-6 h-6 rounded-full flex items-center justify-center text-sm">1</span>
                구글 스프레드시트 & Apps Script 생성
              </h3>
              <ol className="list-decimal pl-5 space-y-2 text-sm text-gray-700 mt-3">
                <li>새 구글 스프레드시트를 만듭니다.</li>
                <li>상단 메뉴에서 <b>[확장 프로그램] > [Apps Script]</b>를 클릭합니다.</li>
                <li>아래 코드를 복사하여 편집기에 붙여넣고 저장합니다.</li>
              </ol>
              <div className="mt-3 relative">
                <textarea readOnly className="w-full h-48 bg-gray-800 text-green-400 text-xs p-3 rounded-lg font-mono focus:outline-none" value={gasCode}></textarea>
              </div>
            </section>

            <section className="bg-white rounded-xl p-4 shadow-sm">
              <h3 className="font-bold text-primary mb-2 flex items-center gap-2">
                <span className="bg-blue-100 text-blue-800 w-6 h-6 rounded-full flex items-center justify-center text-sm">2</span>
                배포 및 웹앱 URL 연동
              </h3>
              <ol className="list-decimal pl-5 space-y-2 text-sm text-gray-700 mt-3">
                <li>우측 상단 <b>[배포] > [새 배포]</b> 클릭</li>
                <li>유형 선택에서 <b>웹 앱(Web App)</b> 톱니바퀴 클릭</li>
                <li>액세스 권한: <b>모든 사용자(Anyone)</b>로 설정 후 배포</li>
                <li>(중요) 권한 검토가 나오면 고급 > '안전하지 않음'으로 이동하여 허용</li>
                <li>생성된 <b>웹 앱 URL</b>을 복사하여 index.html 최상단 <code className="bg-gray-100 px-1 rounded">GOOGLE_SCRIPT_URL</code> 변수에 붙여넣습니다.</li>
              </ol>
            </section>

            <section className="bg-white rounded-xl p-4 shadow-sm">
              <h3 className="font-bold text-primary mb-2 flex items-center gap-2">
                <span className="bg-blue-100 text-blue-800 w-6 h-6 rounded-full flex items-center justify-center text-sm">3</span>
                PWA / 홈 화면에 추가 방법
              </h3>
              <ul className="list-disc pl-5 space-y-2 text-sm text-gray-700 mt-3">
                <li><b>iOS Safari:</b> 하단 공유 버튼(네모에 위화살표) 탭 &rarr; '홈 화면에 추가'</li>
                <li><b>Android Chrome:</b> 우측 상단 메뉴(점 3개) 탭 &rarr; '홈 화면에 추가'</li>
              </ul>
            </section>
            
            <p className="text-center text-xs text-gray-400 pb-8">Created by Yang DH</p>
          </div>
        </div>
      );
    };

    // ==========================================
    // 7. 메인 App 컴포넌트
    // ==========================================
    const App = () => {
      const [view, setView] = useState('home'); // 'home' | 'quiz' | 'result'
      const [student, setStudent] = useState({ gradeClass: '', name: '' });
      const [answers, setAnswers] = useState({});
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [modal, setModal] = useState({ isOpen: false });
      const [toastMsg, setToastMsg] = useState(null);
      const [isGuideOpen, setIsGuideOpen] = useState(false);
      
      const backPressCountRef = useRef(0);
      const backPressTimerRef = useRef(null);

      // 로컬 스토리지 초기 로드
      useEffect(() => {
        const savedStudent = localStorage.getItem('draft_student');
        const savedAnswers = localStorage.getItem('draft_answers');
        if (savedStudent) setStudent(JSON.parse(savedStudent));
        if (savedAnswers) setAnswers(JSON.parse(savedAnswers));
      }, []);

      // 로컬 스토리지 자동 저장 (디바운스)
      useDebouncedSave('draft_student', student, 500);
      useDebouncedSave('draft_answers', answers, 1000);

      // 라우팅(History API) 동기화
      const navigate = useCallback((newView) => {
        window.history.pushState({ view: newView }, '', '');
        setView(newView);
        window.scrollTo(0, 0);
      }, []);

      // 초기 History 상태 세팅
      useEffect(() => {
        window.history.replaceState({ view: 'home' }, '', '');
      }, []);

      // 뒤로가기 핸들러 (popstate)
      useEffect(() => {
        const handlePopState = (e) => {
          const currentView = e.state?.view || 'home';
          
          if (isGuideOpen) {
            setIsGuideOpen(false);
            window.history.pushState({ view: view }, '', ''); // 뷰 복구
            return;
          }

          if (modal.isOpen) {
            setModal({ isOpen: false });
            window.history.pushState({ view: view }, '', ''); // 뷰 복구
            return;
          }

          if (view === 'quiz' && currentView === 'home') {
            // 폼 작성 중 뒤로가기 시 확인
            window.history.pushState({ view: 'quiz' }, '', ''); // 일단 현재 뷰 유지
            setModal({
              isOpen: true,
              title: "퀴즈 나가기",
              message: "작성 중인 내용은 임시저장됩니다. 홈으로 돌아가시겠습니까?",
              confirmText: "나가기",
              onConfirm: () => {
                setModal({ isOpen: false });
                setView('home');
                window.history.replaceState({ view: 'home' }, '', '');
              },
              onCancel: () => setModal({ isOpen: false })
            });
            return;
          }

          if (view === 'result' && currentView === 'quiz') {
             // 결과 화면에서 뒤로가기 방지 (처음으로 가기 유도)
             window.history.pushState({ view: 'result' }, '', '');
             setToastMsg("하단의 '처음으로 돌아가기' 버튼을 이용해주세요.");
             return;
          }

          if (view === 'home' || currentView === 'home') {
            backPressCountRef.current += 1;
            if (backPressCountRef.current === 1) {
              setToastMsg("한 번 더 누르면 종료됩니다.");
              window.history.pushState({ view: 'home' }, '', ''); // 상태 유지
              
              backPressTimerRef.current = setTimeout(() => {
                backPressCountRef.current = 0;
                setToastMsg(null);
              }, 2000);
            } else {
              // 두 번 누름 -> 진짜 뒤로가기(종료) 허용
              window.history.back(); 
            }
            return;
          }

          setView(currentView);
        };

        window.addEventListener('popstate', handlePopState);
        return () => window.removeEventListener('popstate', handlePopState);
      }, [view, isGuideOpen, modal.isOpen]);

      // 새로고침/이탈 방지
      useEffect(() => {
        const handleBeforeUnload = (e) => {
          if (view === 'quiz') {
            e.preventDefault();
            e.returnValue = '';
          }
        };
        window.addEventListener('beforeunload', handleBeforeUnload);
        return () => window.removeEventListener('beforeunload', handleBeforeUnload);
      }, [view]);

      const handleStartQuiz = () => {
        if (!student.gradeClass.trim() || !student.name.trim()) {
          setModal({
            isOpen: true,
            title: "알림",
            message: "학번과 이름을 모두 입력해주세요.",
            onConfirm: () => setModal({ isOpen: false })
          });
          return;
        }
        navigate('quiz');
      };

      const handleAnswerChange = (qId, value) => {
        setAnswers(prev => ({ ...prev, [qId]: value }));
      };

      const handleSubmit = async () => {
        let unansweredCount = 0;
        let totalQuestions = 0;
        
        quizData.forEach(unit => {
          unit.questions.forEach(q => {
            totalQuestions++;
            const userAns = answers[q.id];
            if (!userAns || String(userAns).trim() === '') {
              unansweredCount++;
            }
          });
        });

        // 1. 미입력 문항 검사 (전체 필수)
        if (unansweredCount > 0) {
           setModal({
            isOpen: true,
            title: "알림",
            message: `아직 풀지 않은 문제가 ${unansweredCount}개 있습니다. 모든 문제를 풀고 제출해주세요.`,
            onConfirm: () => setModal({ isOpen: false })
          });
          return;
        }

        // 2. 점수 계산
        let correctCount = 0;
        quizData.forEach(unit => {
          unit.questions.forEach(q => {
             if (checkAnswer(q.answer, answers[q.id])) correctCount++;
          });
        });
        const score = Math.round((correctCount / totalQuestions) * 100);

        setModal({
          isOpen: true,
          title: "제출 확인",
          message: "작성한 퀴즈를 제출하시겠습니까? 제출 후에는 수정할 수 없습니다.",
          confirmText: "제출하기",
          onConfirm: async () => {
            setModal({ isOpen: false });
            setIsSubmitting(true);

            // 데이터 취합
            const payload = {
              "학번": student.gradeClass,
              "이름": student.name,
              "점수": score,
              "정답수": `${correctCount} / ${totalQuestions}`,
              ...answers
            };

            try {
              // mode: 'no-cors'는 응답을 읽을 수 없으므로 성공으로 간주함
              await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              
              // 성공 처리
              localStorage.removeItem('draft_answers'); // 제출 후 임시저장 초기화 (state는 유지하여 결과창에서 사용)
              setIsSubmitting(false);
              navigate('result');

            } catch (error) {
              setIsSubmitting(false);
              setModal({
                isOpen: true,
                title: "오류 발생",
                message: "제출 중 문제가 발생했습니다. 네트워크 연결을 확인해주세요.",
                onConfirm: () => setModal({ isOpen: false })
              });
            }
          },
          onCancel: () => setModal({ isOpen: false })
        });
      };

      const openGuide = () => {
        window.history.pushState({ view: view, modal: 'guide' }, '', '');
        setIsGuideOpen(true);
      };

      // --- Views (내부 컴포넌트 형태에서 함수 호출 형태로 변경하여 리렌더링 시 포커스 유지) ---
      const renderHomeView = () => (
        <div className="flex flex-col items-center justify-center min-h-[100dvh] p-6 pt-safe pb-safe max-w-screen-sm mx-auto">
          <div className="w-full glass rounded-3xl p-8 shadow-xl text-center">
            <div className="bg-blue-100 text-primary w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
              <span className="text-4xl">🔬</span>
            </div>
            <h1 className="text-2xl font-bold mb-2">중등 과학 복습 퀴즈</h1>
            <p className="text-gray-500 mb-8 text-sm">1단원 ~ 6단원 핵심 개념 정리</p>

            <div className="space-y-4 text-left">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1 ml-1">학번 (예: 2학년 2반 3번 &rarr; 2203)</label>
                <input 
                  type="number" 
                  value={student.gradeClass}
                  onChange={(e) => setStudent({...student, gradeClass: e.target.value})}
                  placeholder="학번 입력" 
                  className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1 ml-1">이름</label>
                <input 
                  type="text" 
                  value={student.name}
                  onChange={(e) => setStudent({...student, name: e.target.value})}
                  placeholder="이름 입력" 
                  className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                />
              </div>
            </div>

            <Button onClick={handleStartQuiz} className="w-full mt-8 text-lg font-bold shadow-md">
              퀴즈 시작하기
            </Button>
          </div>
          <button onClick={openGuide} className="fixed bottom-6 right-6 p-3 bg-white/80 backdrop-blur rounded-full shadow-lg text-gray-500 hover:text-primary active:scale-95 transition-transform z-40 pb-safe">
            <Icons.Gear />
          </button>
        </div>
      );

      const renderQuizView = () => (
        <div className="min-h-[100dvh] flex flex-col pt-safe pb-safe bg-gray-50">
          <header className="sticky top-0 bg-white/90 backdrop-blur border-b px-4 py-3 flex items-center gap-3 z-30">
            <button onClick={() => window.history.back()} className="p-2 -ml-2 text-gray-600 active:scale-95 min-w-[44px] min-h-[44px] flex items-center justify-center">
              <Icons.ChevronLeft />
            </button>
            <div className="flex-1">
              <h1 className="font-bold text-lg leading-tight">과학 퀴즈</h1>
              <p className="text-xs text-gray-500">{student.gradeClass} {student.name}</p>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto p-4 max-w-screen-md mx-auto w-full pb-24">
            {quizData.map((unitData, uIdx) => (
              <div key={uIdx} className="mb-10 last:mb-0">
                <h2 className="text-xl font-bold mb-4 text-primary bg-blue-50 py-2 px-3 rounded-lg border border-blue-100">{unitData.unit}</h2>
                <div className="space-y-6">
                  {unitData.questions.map((q, qIdx) => {
                    const currentAnswer = answers[q.id] || '';
                    return (
                      <div key={q.id} className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                        <div className="flex gap-2 mb-3">
                          <span className="font-bold text-gray-400 mt-0.5">{qIdx + 1}.</span>
                          <p className="font-medium text-gray-800 leading-relaxed text-[15px]">{q.q}</p>
                        </div>
                        
                        <div className="pl-6 mt-3">
                          {q.type === 'fill' && (
                            <input 
                              type="text" 
                              value={currentAnswer}
                              onChange={(e) => handleAnswerChange(q.id, e.target.value)}
                              placeholder={q.placeholder || "정답 입력"}
                              className="w-full border-b-2 border-gray-200 focus:border-primary px-2 py-2 bg-gray-50 rounded-t-md focus:bg-blue-50/30 transition-colors focus:outline-none"
                            />
                          )}
                          
                          {q.type === 'ox' && (
                            <div className="flex gap-3">
                              <button 
                                onClick={() => handleAnswerChange(q.id, 'O')}
                                className={`flex-1 py-3 rounded-xl border-2 font-bold text-xl transition-all min-h-[44px] ${currentAnswer === 'O' ? 'border-primary bg-blue-50 text-primary' : 'border-gray-200 text-gray-400 bg-gray-50'}`}
                              >O</button>
                              <button 
                                onClick={() => handleAnswerChange(q.id, 'X')}
                                className={`flex-1 py-3 rounded-xl border-2 font-bold text-xl transition-all min-h-[44px] ${currentAnswer === 'X' ? 'border-red-500 bg-red-50 text-red-500' : 'border-gray-200 text-gray-400 bg-gray-50'}`}
                              >X</button>
                            </div>
                          )}

                          {q.type === 'mc' && (
                            <div className="space-y-2">
                              {q.options.map((opt, oIdx) => {
                                const isSelected = currentAnswer === opt;
                                return (
                                  <button
                                    key={oIdx}
                                    onClick={() => handleAnswerChange(q.id, opt)}
                                    className={`w-full text-left p-3 rounded-xl border transition-all min-h-[44px] text-sm ${isSelected ? 'border-primary bg-blue-50 text-primary font-medium' : 'border-gray-200 bg-white text-gray-600'}`}
                                  >
                                    {opt}
                                  </button>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      </div>
                    )
                  })}
                </div>
              </div>
            ))}
          </main>

          <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur border-t pb-safe z-30">
            <div className="max-w-screen-md mx-auto">
               <Button onClick={handleSubmit} className="w-full text-lg shadow-lg">제출하기</Button>
            </div>
          </div>
        </div>
      );

      const renderResultView = () => {
        let correctCount = 0;
        let totalQuestions = 0;
        
        // 결과 렌더링 시 점수 재계산
        quizData.forEach(unit => {
          unit.questions.forEach(q => {
            totalQuestions++;
            if (checkAnswer(q.answer, answers[q.id])) correctCount++;
          });
        });
        const score = Math.round((correctCount / totalQuestions) * 100);

        return (
          <div className="min-h-[100dvh] flex flex-col pt-safe pb-safe bg-gray-50">
            <header className="sticky top-0 bg-white/90 backdrop-blur border-b px-4 py-3 flex items-center justify-center z-30 shadow-sm">
              <h1 className="font-bold text-lg">결과 확인</h1>
            </header>

            <main className="flex-1 overflow-y-auto p-4 max-w-screen-md mx-auto w-full pb-24">
              {/* 상단 점수 요약 */}
              <div className="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 text-center mb-8">
                <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-4 mx-auto animate-bounce-short text-green-500">
                  <Icons.Check />
                </div>
                <h2 className="text-2xl font-black mb-2 text-gray-800">제출 완료!</h2>
                <p className="text-gray-500 mb-6">{student.name} 학생의 결과입니다.</p>
                <div className="inline-block bg-blue-50 px-8 py-5 rounded-2xl border border-blue-100">
                  <div className="text-sm font-bold text-primary mb-1">총점</div>
                  <div className="text-5xl font-black text-primary">{score}<span className="text-2xl">점</span></div>
                  <div className="text-sm text-gray-500 mt-2 font-medium">총 {totalQuestions}문제 중 {correctCount}문제 정답</div>
                </div>
              </div>

              <h3 className="text-xl font-black mb-6 px-2 text-gray-800">상세 결과 및 해설</h3>
              
              {/* 오답 및 해설 목록 */}
              <div className="space-y-8">
                {quizData.map((unitData, uIdx) => (
                  <div key={uIdx} className="space-y-4">
                    <h4 className="font-bold text-primary bg-blue-50 py-2 px-3 rounded-lg border border-blue-100">{unitData.unit}</h4>
                    {unitData.questions.map((q, qIdx) => {
                      const userAns = answers[q.id] || '';
                      const isCorrect = checkAnswer(q.answer, userAns);
                      const displayAnswer = Array.isArray(q.answer) ? q.answer[0] : q.answer;

                      return (
                        <div key={q.id} className={`bg-white rounded-2xl p-5 shadow-sm border-l-4 ${isCorrect ? 'border-green-400' : 'border-red-400'}`}>
                          <div className="flex gap-2 mb-3">
                            <span className="font-bold text-gray-400 mt-0.5">{qIdx + 1}.</span>
                            <p className="font-medium text-gray-800 leading-relaxed text-[15px]">{q.q}</p>
                          </div>
                          
                          <div className="pl-6 space-y-3 mt-4">
                            {/* 내 답안 */}
                            <div className={`flex flex-wrap items-center gap-2 p-3 rounded-xl text-sm ${isCorrect ? 'bg-green-50' : 'bg-red-50'}`}>
                              <span className="font-bold text-gray-500 min-w-[50px]">내 답안</span>
                              <span className={`font-bold ${isCorrect ? 'text-green-700' : 'text-red-600'}`}>{userAns}</span>
                              {isCorrect 
                                ? <span className="ml-auto bg-green-500 text-white px-2 py-1 rounded text-xs font-bold">정답!</span> 
                                : <span className="ml-auto bg-red-500 text-white px-2 py-1 rounded text-xs font-bold">오답</span>}
                            </div>
                            
                            {/* 정답 표시 (틀렸을 때만) */}
                            {!isCorrect && (
                              <div className="flex flex-wrap items-center gap-2 bg-blue-50 p-3 rounded-xl text-sm">
                                <span className="font-bold text-primary min-w-[50px]">정답</span>
                                <span className="font-bold text-blue-800">{displayAnswer}</span>
                              </div>
                            )}

                            {/* 해설 */}
                            {q.explanation && (
                              <div className="mt-2 text-sm text-gray-600 bg-gray-100 p-4 rounded-xl border border-gray-200 leading-relaxed">
                                <span className="font-black text-gray-700 mr-2">💡 해설:</span>
                                {q.explanation}
                              </div>
                            )}
                          </div>
                        </div>
                      )
                    })}
                  </div>
                ))}
              </div>
            </main>

            <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur border-t pb-safe z-30">
              <div className="max-w-screen-md mx-auto">
                 <Button onClick={() => {
                  setStudent({ gradeClass: '', name: '' });
                  setAnswers({});
                  navigate('home');
                }} variant="outline" className="w-full text-lg shadow-sm bg-white hover:bg-gray-50">처음으로 돌아가기</Button>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="w-full h-full">
          {view === 'home' && renderHomeView()}
          {view === 'quiz' && renderQuizView()}
          {view === 'result' && renderResultView()}
          
          <CustomModal {...modal} />
          <GuideModal isOpen={isGuideOpen} onClose={() => {
            setIsGuideOpen(false);
            window.history.back(); // 팝스테이트 스택에서 가이드 모달 제거
          }} />
          <Toast message={toastMsg} />
          {isSubmitting && <FullScreenSpinner />}
        </div>
      );
    };

    // React 18 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
